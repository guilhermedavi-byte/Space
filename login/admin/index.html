<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Admin | Space</title>
    <meta name="description" content="Acesse o painel administrativo da Space." />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-view="auth" data-page="login" data-login-role="admin">
    <div class="page-glow page-glow-left" aria-hidden="true"></div>
    <div class="page-glow page-glow-right" aria-hidden="true"></div>

    <div class="auth-shell auth-shell-login">
      <div class="auth-login-left">
        <a class="auth-login-logo" href="/" aria-label="Voltar para a landing page">
          <img class="auth-login-logo-img" src="/assets/space-logo.png" alt="Logo Space" />
        </a>
        <div class="auth-login-copy">
          <h1 class="auth-login-phrase" data-login-phrase>Tudo sob controle, de um só lugar.</h1>
          <p class="auth-login-sub" data-login-sub>Entre com suas credenciais para continuar.</p>
        </div>
        <div class="auth-login-footer-shape" aria-hidden="true"></div>
      </div>

      <div class="auth-login-right">
        <div class="auth-login-form-shell">
          <a class="auth-back" href="/">← Trocar perfil</a>
          <div class="auth-login-badge" data-login-badge>Entrando como Administrador</div>

          <form class="auth-form" data-login-form novalidate>
            <label class="auth-field">
              <span>E-mail</span>
              <input class="auth-input" type="email" autocomplete="email" data-login-email />
              <div class="auth-inline-error" data-login-email-error hidden>E-mail inválido</div>
            </label>

            <label class="auth-field">
              <span>Senha</span>
              <div class="auth-password">
                <input class="auth-input" type="password" autocomplete="current-password" data-login-password />
                <button class="auth-eye" type="button" data-login-eye aria-label="Mostrar senha">
                  <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M2.5 12s3.5-6.5 9.5-6.5 9.5 6.5 9.5 6.5-3.5 6.5-9.5 6.5S2.5 12 2.5 12Z"></path>
                    <path d="M12 15.2a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4Z"></path>
                  </svg>
                </button>
              </div>
              <div class="auth-inline-error" data-login-password-error hidden>Senha obrigatória</div>
            </label>

            <div class="auth-forgot">
              <a href="#" data-login-forgot>Esqueci minha senha</a>
            </div>

            <button class="auth-submit" type="submit" data-login-submit>
              <span data-login-submit-label>Entrar</span>
              <span class="auth-spinner" data-login-spinner hidden aria-hidden="true"></span>
            </button>

            <div class="auth-form-error" data-login-error hidden>E-mail ou senha incorretos</div>

            <div class="auth-support">
              Problemas para acessar? <a href="#" data-login-support>Entre em contato com o suporte</a>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="/auth.js" defer></script>
  </body>
</html>
